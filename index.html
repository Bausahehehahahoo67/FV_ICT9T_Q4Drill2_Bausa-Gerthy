<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <button class="btn btn-info" onclick="teamrank()">Team Rank</button>
    <script>

        function teamrank(){
            var rank = "1st";
            message = "";
                
            switch(true){
            
                case (rank === "1st") :
                    message = "First";
                    break;
                case (rank === "2nd") :
                    message = "Second";
                    break;
                case (rank === "3rd") :
                    message = "Third";
                    break;
                case (rank === "4th") :
                    message = "Fourth";
                    break;
                default:
                    message = "Invalid rank";
           }
          alert(message);
        }  
</body>
</html>
